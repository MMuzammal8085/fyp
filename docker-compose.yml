services:
  mongo:
    image: mongo:7
    container_name: intellihire-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:22-alpine
    container_name: intellihire-backend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/fyp}
      JWT_SECRET: ${JWT_SECRET:-FYP_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"

  frontend:
    image: node:22-alpine
    container_name: intellihire-frontend
    profiles:
      - frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  mongo_data:
